#  INPUT  #
input {
    kb_layout = br
    kb_variant = abnt2

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = false
        clickfinger_behavior = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = 0
}
