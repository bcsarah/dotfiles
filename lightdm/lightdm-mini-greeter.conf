# LightDM Mini Greeter Configuration
# To test your configuration out, run: lightdm --test-mode
[greeter]
user = bcsarah
show-password-label = true
password-label-text = 
invalid-password-text = Invalid Password
show-input-cursor = true
password-alignment = center
password-input-width = -1
show-image-on-all-monitors = false


[greeter-hotkeys]
mod-key = meta
shutdown-key = s
restart-key = r
hibernate-key = h
suspend-key = u


[greeter-theme]
font = "Sans"
font-size = 1em
font-weight = bold
font-style = normal

# Textos (Gruvbox light foreground)
text-color = "#EBDBB2"
error-color = "#FB4934"

# Fundos (Gruvbox dark)
background-image = ""
background-color = "#282828"
window-color = "#3C3836"
border-color = "#B8BB26"

border-width = 2px
layout-space = 15

# Input da senha (Gruvbox)
password-color = "#EBDBB2"
password-background-color = "#504945"
password-border-color = "#FE8019"

password-border-width = 2px
password-border-radius = 0.341125em
